name: Build CC CLI

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [linux, windows, darwin]
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Install Deps
        run: |
          cd src && 
          go get .

      - name: Build
        run: |
          env GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -o cccli-${{ matrix.os }}-${{ matrix.arch }}

      - name: Rename Windows Executables
        if: matrix.os == 'windows'
        run: |
          mv mycli-windows-${{ matrix.arch }} mycli-windows-${{ matrix.arch }}.exe

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cccli-binaries-${{ matrix.os }}-${{ matrix.arch }}
          path: cccli-${{ matrix.os }}-${{ matrix.arch }}*
